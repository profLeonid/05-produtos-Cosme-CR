<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <script src="./app.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Document</title>
</head>
<body class="bg-[#0f172a] text-white flex items-center justify-center min-h-screen">

    <div class="bg-[#111827]/80 backdrop-blur-lg border border-gray-700 shadow-2xl rounded-2xl p-8 w-[650px]">
    
        <h1 class="text-3xl font-bold mb-6 text-center tracking-wide">
            🧾 Inventário
        </h1>
    
        <div class="flex gap-3 mb-6"> 
            <input type="text" placeholder="Produto"
                class="bg-[#1f2937] border border-gray-600 rounded-lg px-3 py-2 w-full focus:ring-2 focus:ring-cyan-400 outline-none"
                id="produto"
            >
    
            <input type="text" placeholder="R$"
                class="bg-[#1f2937] border border-gray-600 rounded-lg px-3 py-2 w-24 focus:ring-2 focus:ring-cyan-400 outline-none"
                id="valor"
            >
    
            <input type="text" placeholder="Qtd"
                class="bg-[#1f2937] border border-gray-600 rounded-lg px-3 py-2 w-20 focus:ring-2 focus:ring-cyan-400 outline-none"
                id="quantidade"
            >
    
            <button
            class="bg-cyan-500 hover:bg-cyan-400 text-black font-semibold px-4 py-2 rounded-lg transition shadow-lg shadow-cyan-500/30"
            onclick="adicionarProduto()"
            >
                ADD
            </button>
        </div>
    
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="text-cyan-400 border-b border-gray-700">
                    <tr>
                        <th class="text-left py-3">Produto</th>
                        <th class="text-left py-3">Valor</th>
                        <th class="text-left py-3">Qtd</th>
                    </tr>
                </thead>
    
                <tbody class="divide-y divide-gray-700">
                    <tr class="hover:bg-[#1f2937] transition">
                        <td id="nproduto" class="py-3"></td>
                        <td id="vproduto" class="py-3"></td>
                        <td id="qproduto" class="py-3"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    
    </div>
    
    </body>
</html>
